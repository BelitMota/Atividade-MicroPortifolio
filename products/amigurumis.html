<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria - Amigurumis</title>
    <!-- Voltamos um nível com "../" para pegar o mesmo arquivo de estilo principal -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/content.css">
</head>

<body>

    <header>
        <div class="container">
            <h1>Amigurumis Feitos à Mão</h1>
            <nav>
                <!-- Link para voltar para a página inicial -->
                <a href="../index.html">&larr; Voltar ao Início</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <h2>Álbum de Fotos</h2>
        <p class="subtitulo-galeria">Confira abaixo alguns dos bichinhos já entregues.</p>

        <!-- Grade de Fotos -->
        <div class="grid-galeria">

            <!-- Foto 1 -->
            <div class="item-galeria">
                <img src="../assets/imgs/ursinho.jfif" alt="Ursinho de crochê marrom">
                <div class="legenda-foto">Ursinho (Fio 100% Algodão)</div>
            </div>

            <!-- Foto 2 -->
            <div class="item-galeria">
                <img src="../assets/imgs/polvinho.jfif" alt="Polvo de crochê">
                <div class="legenda-foto">Polvo Infantil</div>
            </div>

            <!-- Foto 3 -->
            <div class="item-galeria">
                <img src="../assets/imgs/dinossauro.jfif" alt="Dinossauro de crochê">
                <div class="legenda-foto">Dino</div>
            </div>

            <!-- Foto 4 -->
            <div class="item-galeria">
                <img src="../assets/imgs/coelha_mimi.jfif" alt="Coelhinho de crochê">
                <div class="legenda-foto">Coelhinha Mimi</div>
            </div>

        </div>
    </main>

    <footer>
        <p>&copy; 2026 TesteCroches. Fotos reais de peças autorais.</p>
    </footer>

</body>

</html>
